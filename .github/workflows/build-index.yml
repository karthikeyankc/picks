name: Build index.json

on:
  push:
    branches: [main]
    paths:
      - 'picks/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.json
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = 'picks';
            const files = fs.readdirSync(dir)
              .filter(f => f.endsWith('.json'))
              .map(f => JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8')))
              .sort((a, b) => new Date(b.date) - new Date(a.date));
            fs.writeFileSync('index.json', JSON.stringify(files, null, 2));
            console.log('Built index.json with', files.length, 'picks');
          "

      - name: Commit index.json
        run: |
          git config user.name "picks-bot"
          git config user.email "picks-bot@users.noreply.github.com"
          git add index.json
          git diff --staged --quiet || git commit -m "chore: rebuild index.json [skip ci]"
          git push
