name: Build index.json

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.json and update config.json
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const dir = 'picks';
          const files = fs.existsSync(dir)
            ? fs.readdirSync(dir)
                .filter(f => f.endsWith('.json'))
                .map(f => JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8')))
                .sort((a, b) => new Date(b.date) - new Date(a.date))
            : [];
          fs.writeFileSync('index.json', JSON.stringify(files, null, 2));
          console.log('Built index.json with', files.length, 'picks');

          const allTags = [...new Set(files.flatMap(p => p.tags || []))].sort();
          const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
          config.tags = allTags;
          fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          console.log('Updated config.json with', allTags.length, 'tags:', allTags.join(', '));
          EOF

      - name: Commit and push
        run: |
          git config user.name "picks-bot"
          git config user.email "picks-bot@users.noreply.github.com"
          git add index.json config.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: rebuild index [skip ci]"
            git push
          fi
